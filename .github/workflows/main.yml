name: 半導體戰情室流水線

on:
  schedule:
    - cron: '0 */4 * * *' # 每 4 小時分析一次
  workflow_dispatch:

# 核心：開放寫入權限，否則 reports 會存不進去
permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 強制使用新環境，消滅警告
    steps:
      - name: 檢查代碼
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝套件
        run: pip install yfinance pandas groq requests

      - name: 執行數據抓取
        run: python fetcher.py

      - name: 執行 AI 分析
        env:
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
        run: python analyzer.py

      - name: 強制更新 GitHub 檔案
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add data_raw.json analysis_results.json
          git commit -m "🤖 自動更新分析 [$(date)]" || exit 0
          git push origin main
