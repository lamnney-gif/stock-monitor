name: 自動化股價診斷流水線

on:
  schedule:
    - cron: '0 */4 * * *' # 每 4 小時自動跑一次
  workflow_dispatch:      # 允許手動點擊執行

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: 檢查代碼
        uses: actions/checkout@v4 # 升級到 v4

      - name: 設定 Python
        uses: actions/setup-python@v5 # 升級到 v5
        with:
          python-version: '3.10'

      - name: 安裝套件
        run: pip install yfinance pandas groq scikit-learn

      # 執行全量數據抓取 (包含本益比、ATR等)
      - name: 執行數據抓取
        run: python fetcher.py

      # 執行 AI 分析
      - name: 執行 AI 分析
        env:
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
        run: python analyzer.py

      - name: 存回 GitHub
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add data_raw.json analysis_results.json
          git commit -m "🤖 自動更新全量數據 [$(date)]" || exit 0
          git push
