name: 4h AI Strategist

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 不要抓全部歷史，直接抓最新一份，減少 128 衝突
          fetch-depth: 1 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Run AI
        env:
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
        run: |
          pip install groq pandas
          python analyzer.py

      - name: Push Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          
          # 解決 128 錯誤的最強手段：強制從遠端覆蓋
          git fetch origin main
          git checkout main analysis_results.json || echo "New file"
          
          git add analysis_results.json
          
          # 檢查是否有變動
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "🧠 AI Update $(date +'%Y-%m-%d %H:%M')"
            # 暴力推播：失敗就 rebase 重試 3 次
            n=0
            until [ $n -ge 3 ]
            do
              git push origin main && break
              n=$((n+1))
              git pull --rebase origin main
              sleep 5
            done
          fi
