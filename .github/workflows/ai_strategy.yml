name: 4h AI Strategist

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

# 🟢 只設這一個，解決 Node.js 警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Run AI
        env:
          # 🟢 傳入你的兩把鑰匙
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
        run: |
          pip install groq pandas
          python analyzer.py

      - name: Push Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "github-actions[bot]"
          
          # 解決 128 錯誤與更新無效：強制拉取遠端最新檔案
          git pull origin main --rebase
          
          git add analysis_results.json
          
          # 檢查是否有真正的差異
          if git diff --staged --quiet; then
            echo "No changes detected, skipping push."
          else
            git commit -m "🧠 AI Strategy Updated: $(date +'%Y-%m-%d %H:%M')"
            # 暴力推播 5 次，直到成功
            for i in {1..5}; do
              git push origin main && exit 0 || (git pull --rebase origin main && sleep 5)
            done
          fi
