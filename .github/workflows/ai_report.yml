name: 4h AI Strategist
on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install deps
        run: pip install groq
      - name: Run AI
        env:
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
        run: python analyzer.py
      - name: Push
        env:
          TZ: Asia/Taipei
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "AI-Bot"
          # 關鍵：先拉回行情數據，再推 AI 報告
          git pull --rebase origin main
          git add analysis_results.json
          git commit -m "🧠 AI 戰略報告更新: $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
          git push
