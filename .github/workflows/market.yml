name: 60s Market Monitor
on:
  schedule:
    - cron: '*/5 * * * *'  # UTC，每 15 分鐘跑一次
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install deps
        run: pip install yfinance pandas
      - name: Run Fetcher
        run: python fetcher.py
      - name: Show last update
        run: |
          python -c "import json; data=json.load(open('data_raw.json')); print('上次更新時間:', data.get('last_update'))"
      - name: Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "MarketBot"
          git add data_raw.json
          git commit -m "📈 實時行情更新: $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
          git push
