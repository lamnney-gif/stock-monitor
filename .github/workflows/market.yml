name: 60s Market Monitor
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install deps
        run: pip install yfinance pandas
      - name: Run Fetcher
        run: python fetcher.py
      - name: Push
        env:
          TZ: Asia/Taipei
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "MarketBot"
          # 關鍵：先拉回 AI 報告，再推行情數據
          git pull --rebase origin main
          git add data_raw.json
          git commit -m "📈 實時行情更新: $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
          git push
