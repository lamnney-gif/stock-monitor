name: Auto_AI_Analysis

on:
  schedule:
    - cron: '0 1 * * 1-5'  # 台北時間 09:00 自動執行
    - cron: '30 5 * * 1-5' # 台北時間 13:30 收盤跑
  workflow_dispatch:      # 讓你可以手動點擊按鈕執行

permissions:
  contents: write         # 允許機器人把分析結果寫回你的專案

jobs:
  run_ai:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install yfinance google-generativeai pandas
      - env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python ai_hunter.py
      - name: 存檔回 GitHub
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add ai_report.json
          git commit -m "🤖 自動更新 AI 診斷" || exit 0
          git push
