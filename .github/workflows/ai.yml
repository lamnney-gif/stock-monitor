name: Auto_AI_Analysis

on:
  schedule:
    - cron: '0 1 * * 1-5'  # 台北時間 09:00
    - cron: '30 5 * * 1-5' # 台北時間 13:30
  workflow_dispatch:      

permissions:
  contents: write         

jobs:
  run_ai:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 檢出代碼 (已更新至 v4)
        uses: actions/checkout@v4  # 👈 改成 v4 就不會噴警告了

      - name: 2. 設定 Python (已更新至 v5)
        uses: actions/setup-python@v5 # 👈 改成 v5 支援 Node.js 24
        with:
          python-version: '3.10'

      - name: 3. 安裝套件
        run: pip install yfinance google-generativeai pandas

      - name: 4. 執行分析
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 👈 順便加入這個環境變數，跑得更順
        run: python ai_hunter.py

      - name: 5. 存檔回 GitHub
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add ai_report.json
          git commit -m "🤖 自動更新 AI 診斷" || exit 0
          git push
