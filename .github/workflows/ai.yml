name: Auto_AI_Analysis

on:
  schedule:
    - cron: '0 1 * * 1-5'  # 台北時間 09:00
    - cron: '30 5 * * 1-5' # 台北時間 13:30
  workflow_dispatch:      

permissions:
  contents: write         

# 🟢 這裡加入環境變數，強制所有插件使用最新的 Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run_ai:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 檢出代碼
        uses: actions/checkout@v4

      - name: 2. 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. 安裝套件
        run: pip install yfinance google-generativeai pandas

      - name: 4. 執行分析
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # 這裡記得確認你的 model 是寫 gemini-2.5-flash
        run: python ai_hunter.py

      - name: 5. 存檔回 GitHub
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add ai_report.json
          git commit -m "🤖 自動更新 AI 診斷 (Node.js 24)" || exit 0
          git push
